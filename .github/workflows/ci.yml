name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: clientflow_crm_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clientflow_crm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clientflow_crm_test
      JWT_SECRET: ci_jwt_secret
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      AUTH_RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_WINDOW_MS: 900000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run backend lint
        run: npm run lint

      - name: Apply Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Build backend
        run: npm run build

      - name: Run backend smoke tests
        run: |
          npm run start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 8

          curl --fail --silent --show-error http://localhost:5000/api/health > /dev/null

          REGISTER_RESPONSE=$(curl --silent --show-error --request POST http://localhost:5000/api/users/register \
            --header "Content-Type: application/json" \
            --data '{"name":"CI User","email":"ci.user@example.com","password":"password123"}')
          echo "$REGISTER_RESPONSE" | grep -q '"success":true'

          LOGIN_RESPONSE=$(curl --silent --show-error --request POST http://localhost:5000/api/users/login \
            --header "Content-Type: application/json" \
            --data '{"email":"ci.user@example.com","password":"password123"}')
          echo "$LOGIN_RESPONSE" | grep -q '"success":true'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: https://api.example.com/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
